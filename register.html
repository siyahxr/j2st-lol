<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>j2st.icu | Register</title>
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <div class="animated-bg">
        <div class="blob"></div>
        <div class="blob-2"></div>
    </div>
    <div class="grid-overlay"></div>

    <div class="auth-container">
        <div class="auth-brand">
            <img src="/assets/icons/user_dragon.png" alt="j2st" class="auth-logo">
            <span class="auth-title iridescent-text">j2st.icu</span>
        </div>

        <form class="auth-form glass-card" id="form-register" onsubmit="handleRegister(event)">
            <h2 class="form-title">Join j2st.icu</h2>
            <p class="form-sub">Create your premium bio page today</p>

            <div class="field-group">
                <label class="field-label">Username</label>
                <input id="reg-user" class="field-input" type="text" placeholder="Pick a username (min 3 chars)" minlength="3" maxlength="20" required>
                <span class="field-hint">Only letters, numbers and underscores</span>
            </div>
            <div class="field-group">
                <label class="field-label">Email</label>
                <input id="reg-email" class="field-input" type="email" placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="field-group">
                <label class="field-label">Password</label>
                <div class="field-pw-wrap">
                    <input id="reg-pass" class="field-input" type="password" placeholder="Min 8 characters" minlength="8" required autocomplete="new-password">
                    <button type="button" class="pw-toggle" onclick="togglePw('reg-pass',this)">👁</button>
                </div>
                <div class="pw-strength" id="pw-strength"></div>
            </div>
            <div class="field-group">
                <label class="field-label">Confirm Password</label>
                <input id="reg-pass2" class="field-input" type="password" placeholder="Repeat password" required>
            </div>

            <!-- Cloudflare Turnstile widget -->
            <div class="turnstile-wrap">
                <div class="cf-turnstile" id="ts-register" data-theme="dark"></div>
            </div>

            <div id="reg-error" class="form-error"></div>
            <div id="reg-success" class="form-success"></div>

            <button type="submit" class="auth-submit" id="btn-register">Create Account →</button>
            <p class="form-hint">Have an account? <a href="/login">Sign in</a></p>
        </form>

        <p class="auth-back"><a href="/">← Back to home</a></p>
    </div>

    <script type="module" src="/auth.js"></script>
</body>
</html>
