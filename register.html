<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>j2st.lol | Register</title>
    <script>
        if (window.location.hostname.includes('j2st.icu')) {
            window.location.replace('https://j2st.lol' + window.location.pathname + window.location.search);
        }
    </script>
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <div class="animated-bg">
        <div class="blob"></div>
        <div class="blob-2"></div>
    </div>
    <div class="grid-overlay"></div>

    <div class="auth-container">
        <div class="auth-brand">
            <img src="/assets/icons/user_dragon.png" alt="j2st" class="auth-logo">
            <span class="auth-title iridescent-text">j2st.lol</span>
        </div>

        <form class="auth-form glass-card" id="form-register" onsubmit="handleRegister(event)">
            <h2 class="form-title" data-i18n="auth_reg_title">Join j2st.lol</h2>
            <p class="form-sub" data-i18n="auth_reg_sub">Create your premium bio page today</p>

            <div class="field-group">
                <label class="field-label" data-i18n="auth_user">Username</label>
                <input id="reg-user" class="field-input" type="text" placeholder="Pick a username (min 3 chars)" data-i18n="auth_user_ph" minlength="3" maxlength="20" required autocomplete="username">
                <span class="field-hint">Only letters, numbers and underscores</span>
            </div>
            <div class="field-group">
                <label class="field-label" data-i18n="auth_email">Email</label>
                <input id="reg-email" class="field-input" type="email" placeholder="your@email.com" data-i18n="auth_email_ph" required autocomplete="email">
            </div>
            <div class="field-group">
                <label class="field-label" data-i18n="auth_pass">Password</label>
                <div class="field-pw-wrap">
                    <input id="reg-pass" class="field-input" type="password" placeholder="Min 8 characters" data-i18n="auth_pass_ph" minlength="8" required autocomplete="new-password">
                    <button type="button" class="pw-toggle" onclick="togglePw('reg-pass',this)">👁</button>
                </div>
                <div class="pw-strength" id="pw-strength"></div>
            </div>
            <div class="field-group">
                <label class="field-label" data-i18n="auth_pass_confirm">Confirm Password</label>
                <input id="reg-pass2" class="field-input" type="password" placeholder="Repeat password" data-i18n="auth_pass_confirm_ph" required>
            </div>

            <!-- Cloudflare Turnstile widget -->
            <div class="turnstile-wrap">
                <div class="cf-turnstile" id="ts-register" data-theme="dark"></div>
            </div>

            <div id="reg-error" class="form-error"></div>
            <div id="reg-success" class="form-success"></div>

            <button type="submit" class="auth-submit" id="btn-register" data-i18n="auth_signup_btn">Create Account →</button>
            <p class="form-hint"><span data-i18n="auth_have_account">Already have an account?</span> <a href="/login" data-i18n="nav_login">Sign in</a></p>
        </form>

        <p class="auth-back"><a href="/" data-i18n="auth_back">← Back to home</a></p>
    </div>

    <script src="/system/i18n.js"></script>
    <script type="module" src="/auth.js"></script>
</body>
</html>
