<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | j2st.lol</title>
    <script>
        if (window.location.hostname.includes('j2st.lol')) {
            window.location.replace('https://j2st.lol' + window.location.pathname + window.location.search);
        }
    </script>
    <link rel="stylesheet" href="/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="admin-layout">
        <!-- ======= SIDEBAR ======= -->
        <aside class="admin-sidebar">
            <div class="asb-brand">
                <img src="/assets/icons/user_dragon.png" alt="Logo" class="asb-logo">
                <span class="asb-sub">ADMIN_v3.0</span>
            </div>

            <nav class="asb-nav">
                <div class="asb-item active" onclick="switchSection(this, 'overview')">
                    <i class="fa-solid fa-house"></i> Overview
                </div>
                <div class="asb-item" onclick="switchSection(this, 'users')">
                    <i class="fa-solid fa-users"></i> Users
                </div>
                <div class="asb-item" onclick="switchSection(this, 'badges')">
                    <i class="fa-solid fa-award"></i> Badges
                </div>
                <a href="/dashboard" class="asb-item">
                    <i class="fa-solid fa-arrow-left"></i> Exit
                </a>
            </nav>
        </aside>

        <!-- ======= MAIN CONTENT ======= -->
        <main class="admin-main">

            <div class="admin-topbar">
                <h1 class="admin-topbar-title" id="sec-title">Control Center</h1>
            </div>

            <!-- ======= OVERVIEW SECTION ======= -->
            <div class="admin-section active" id="sec-overview">
                <div class="as-stat-row">
                    <div class="as-card">
                        <span class="as-label">Total Users</span>
                        <span class="as-value" id="stat-users">0</span>
                    </div>
                    <div class="as-card">
                        <span class="as-label">Active Today</span>
                        <span class="as-value" id="stat-active">0</span>
                    </div>
                    <div class="as-card">
                        <span class="as-label">Total Views</span>
                        <span class="as-value" id="stat-views">0</span>
                    </div>
                    <div class="as-card">
                        <span class="as-label">Total Badges</span>
                        <span class="as-value" id="stat-badges">0</span>
                    </div>
                </div>
                <div class="as-stat-row" style="margin-top:16px;">
                    <div class="as-card">
                        <span class="as-label">Admin Users</span>
                        <span class="as-value" id="stat-admins">0</span>
                    </div>
                    <div class="as-card">
                        <span class="as-label">Member Users</span>
                        <span class="as-value" id="stat-members">0</span>
                    </div>
                </div>
            </div>

            <!-- ======= USERS SECTION ======= -->
            <div class="admin-section" id="sec-users">
                <div class="glass-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h3 class="panel-title">User Management</h3>
                        <input type="text" class="badge-input" style="width:250px;" placeholder="Search user..."
                            oninput="filterUsers(this.value)">
                    </div>

                    <table class="fancy-table">
                        <thead>
                            <tr>
                                <th>Identity</th>
                                <th>Role</th>
                                <th>Tokens</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                            <!-- JS Inject -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- ======= BADGES SECTION ======= -->
            <div class="admin-section" id="sec-badges">
                <div class="badges-admin-container">
                    <div class="glass-card">
                        <h3 class="panel-title">Deploy New Badge</h3>
                        <div class="badge-form-grid">
                            <div class="form-field">
                                <label class="badge-label">Badge Name</label>
                                <input type="text" id="new-badge-name" class="badge-input"
                                    placeholder="e.g. EARLY_ACCESS">
                            </div>
                            <div class="form-field" style="margin-top:20px;">
                                <label class="badge-label">Icon Asset</label>
                                <div class="badge-upload-box"
                                    onclick="document.getElementById('badge-icon-file').click()">
                                    <span id="badge-upload-status">Click to upload PNG/SVG</span>
                                    <input type="file" id="badge-icon-file" hidden accept="image/*">
                                </div>
                            </div>
                        </div>
                        <button class="badge-deploy-btn" onclick="deployBadge()">Deploy Badge</button>
                    </div>

                    <div class="glass-card">
                        <h3 class="panel-title">Badge Registry</h3>
                        <div class="badge-admin-grid" id="global-badges-list">
                            <p style="color:var(--text-dim);">Syncing...</p>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div class="badge-modal" id="badge-modal">
        <div class="badge-modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 class="panel-title" style="margin:0;">Modify Tokens</h3>
                <button onclick="closeBadgeModal()" class="modal-close-btn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <p id="badge-modal-user"
                style="color:var(--text-dim); margin-bottom:20px; font-size:12px; font-weight:700;"></p>

            <div id="badge-options-list" style="max-height: 300px; overflow-y: auto;">
                <p style="color:var(--text-dim);">Loading...</p>
            </div>

            <div style="display:flex; gap:10px; margin-top:30px;">
                <button class="badge-deploy-btn" onclick="saveUserBadges()" style="margin:0; flex:1;">Commit</button>
                <button class="badge-deploy-btn" onclick="closeBadgeModal()"
                    style="margin:0; background:#ef4444; flex:0.4;">Abort</button>
            </div>
        </div>
    </div>

    <script src="/admin.js"></script>
</body>

</html>
