<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | j2st.icu</title>
    <!-- CSS -->
    <link rel="stylesheet" href="/index.css?v=4.2">
    <link rel="stylesheet" href="/profile.css?v=4.2">
    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <!-- Background System -->
    <div id="full-bg"></div>
    <div class="profile-bg-vignette"></div>

    <!-- Loading State -->
    <div id="loading" class="full-screen-center">
        <div class="dragon-glow-ring"></div>
    </div>

    <!-- Main Profile Card -->
    <div id="profile-container" class="profile-card">
        
        <!-- Identity Section -->
        <div class="avatar-wrapper">
            <img id="avatar-el" src="/assets/icons/user_dragon.png" alt="Avatar" class="profile-avatar">
            <div class="status-indicator"></div>
        </div>

        <h1 class="profile-name" id="name-el">j2st</h1>
        <p class="profile-handle" id="handle-el">@j2st</p>

        <!-- Badges (Always Visible) -->
        <div id="badges-el">
            <!-- Badges injected by JS -->
        </div>

        <!-- Bio -->
        <p class="profile-bio" id="bio-el"></p>

        <!-- Separator -->
        <div class="separator"></div>

        <!-- Links List -->
        <div id="links-el">
            <!-- Links injected by JS -->
        </div>

        <!-- Discord Status (Optional) -->
        <div id="discord-status-container" style="display: none;">
            <div class="discord-card">
                <div class="discord-avatar-box">
                    <img src="" alt="" class="discord-avatar" id="ds-avatar">
                    <div class="status-indicator" id="ds-status-dot"></div>
                </div>
                <div class="discord-info">
                    <p class="discord-user" id="ds-name">User#0000</p>
                    <p class="discord-activity" id="ds-activity">Loading status...</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-info">
            <div class="view-count" id="views-el">
                <i class="fa-solid fa-eye"></i>
                <span>0 views</span>
            </div>
            <a href="/" class="j2st-watermark">Powered by j2st.icu</a>
        </div>
    </div>

    <!-- Error State -->
    <div id="error-container" class="full-screen-center" style="display:none;">
        <h1 class="hero-h1">404</h1>
        <p class="hero-p" style="margin-bottom: 24px;">User not found on j2st.icu</p>
        <a href="/" class="btn-primary">Return Home</a>
    </div>

    <script src="/system/i18n.js?v=4.2"></script>
    <script type="module" src="/profile.js?v=4.2"></script>
</body>

</html>
