<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>j2st.lol | Login</title>
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="animated-bg">
        <div class="blob"></div>
        <div class="blob-2"></div>
    </div>
    <div class="grid-overlay"></div>

    <div class="auth-container">
        <div class="auth-brand">
            <img src="/assets/icons/user_dragon.png" alt="j2st" class="auth-logo">
            <span class="auth-title iridescent-text">j2st.lol</span>
        </div>

        <form class="auth-form glass-card" id="form-login" onsubmit="handleLogin(event)">
            <h2 class="form-title">Tekrar Hoş Geldin</h2>
            <p class="form-sub">j2st.lol hesabına giriş yap</p>

            <div class="field-group">
                <label class="field-label">Kullanıcı Adı</label>
                <input id="login-email" class="field-input" type="text" placeholder="Kullanıcı adı veya e-posta girin"
                    required autocomplete="username">
            </div>
            <div class="field-group">
                <label class="field-label">Şifre</label>
                <div class="field-pw-wrap">
                    <input id="login-pass" class="field-input" type="password" placeholder="Şifrenizi girin"
                        required autocomplete="current-password">
                    <button type="button" class="pw-toggle" onclick="togglePw('login-pass',this)">👁</button>
                </div>
            </div>

            <div id="login-error" class="form-error"></div>
            <div id="login-info" class="form-info"></div>

            <button type="submit" class="auth-submit" id="btn-login">Giriş Yap →</button>
            <p class="form-hint">Hesabın yok mu? <a href="/register">Bir tane oluştur</a></p>
        </form>

        <p class="auth-back"><a href="/">← Ana sayfaya dön</a></p>
    </div>

    <script src="/system/i18n.js"></script>
    <script type="module" src="/auth.js"></script>
</body>

</html>
