<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | J2ST.LOL</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/profile.css">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    
    <!-- Background System -->
    <div id="full-bg"></div>
    <div class="bg-overlay"></div>
    <div class="dynamic-aura" id="aura"></div>

    <!-- Entrance Experience (Overlay) -->
    <div id="click-enter" style="position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 1s ease;">
        <div style="text-align: center;">
            <div style="width: 80px; height: 80px; border: 2px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 0 30px var(--accent-glow);">
                <i class="fa-solid fa-dragon" style="font-size: 32px; color: var(--accent);"></i>
            </div>
            <p style="font-size: 14px; font-weight: 800; letter-spacing: 0.2em; color: var(--accent);">GİRİŞ YAP</p>
        </div>
    </div>

    <!-- Main Profile Card -->
    <div id="profile-card" class="profile-card" style="opacity: 0; transform: scale(0.9); pointer-events: none; transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);">
        <!-- Avatar Area -->
        <div class="avatar-wrapper">
            <img id="avatar-el" src="/assets/icons/user_dragon.png" alt="Avatar" class="profile-avatar">
            <div class="status-dot"></div>
        </div>

        <!-- Identity -->
        <h1 id="name-el" class="profile-name">j2st</h1>
        <p id="bio-el" class="profile-bio">Nebula Void'e hoş geldin.</p>

        <!-- Badges -->
        <div id="badges-el" class="badges-list">
            <!-- Badges injected by JS -->
        </div>

        <!-- Links -->
        <div id="links-el" class="links-container">
            <!-- Links injected by JS -->
        </div>

        <!-- Footer -->
        <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
            <div style="font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <i class="fa-solid fa-eye"></i> <span id="views-el">0</span> GÖRÜNTÜLENME
            </div>
            <a href="/" style="display: block; margin-top: 15px; font-size: 10px; color: rgba(255,255,255,0.2); text-decoration: none; font-weight: 800; letter-spacing: 0.1em;">J2ST.LOL TARAFINDAN DESTEKLENMEKTEDİR</a>
        </div>
    </div>

    <!-- Hidden Audio -->
    <audio id="profile-music-player" loop></audio>

    <!-- JS -->
    <script src="/profile.js"></script>
</body>
</html>
