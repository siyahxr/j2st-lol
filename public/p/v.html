<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>j2st.lol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/profile.css?v=3.0">
</head>

<body>
    <!-- Animated Background -->
    <div class="cyber-bg"></div>
    <div class="cyber-grid"></div>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Click to Enter -->
    <div class="click-enter" id="click-enter">
        <div class="click-enter-content">
            <h2>J2ST.LOL</h2>
            <p>CLICK TO ENTER</p>
        </div>
    </div>

    <!-- Profile Card -->
    <div class="profile-container">
        <div class="profile-card" id="profile-card">
            <!-- Avatar -->
            <div class="avatar-wrapper">
                <div class="avatar-glow"></div>
                <img src="/assets/icons/user_dragon.png" alt="Avatar" class="profile-avatar" id="avatar-el">
            </div>

            <!-- Name -->
            <h1 class="profile-name" id="name-el">User</h1>
            <p class="profile-handle" id="handle-el">@username</p>

            <!-- Bio -->
            <p class="profile-bio" id="bio-el"></p>

            <!-- Badges -->
            <div class="profile-badges" id="badges-el"></div>

            <!-- Links -->
            <div class="profile-links" id="links-el"></div>

            <!-- Social Icons -->
            <div class="profile-socials" id="socials-el"></div>

            <!-- Stats -->
            <div class="profile-stats">
                <div class="stat-item">
                    <div class="stat-value" id="stat-views">0</div>
                    <div class="stat-label">VIEWS</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-links">0</div>
                    <div class="stat-label">LINKS</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Music Player -->
    <audio id="profile-music-player" loop></audio>

    <script src="/profile.js"></script>
</body>

</html>
