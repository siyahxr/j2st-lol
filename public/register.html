<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>j2st.lol | Register</title>
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="animated-bg">
        <div class="blob"></div>
        <div class="blob-2"></div>
    </div>
    <div class="grid-overlay"></div>

    <div class="auth-container">
        <div class="auth-brand">
            <img src="/assets/icons/user_dragon.png" alt="j2st" class="auth-logo">
            <span class="auth-title iridescent-text">j2st.lol</span>
        </div>

        <form class="auth-form glass-card" id="form-register" onsubmit="handleRegister(event)">
            <h2 class="form-title">j2st.lol'a Katıl</h2>
            <p class="form-sub">Bugün premium biyografi sayfanı oluştur</p>

            <div class="field-group">
                <label class="field-label">Kullanıcı Adı</label>
                <input id="reg-user" class="field-input" type="text" placeholder="Bir kullanıcı adı seçin (min 3 kar.)"
                    minlength="3" maxlength="20" required autocomplete="username">
                <span class="field-hint">Sadece harf, rakam ve alt çizgi</span>
            </div>
            <div class="field-group">
                <label class="field-label">E-posta</label>
                <input id="reg-email" class="field-input" type="email" placeholder="ornek@eposta.com"
                    required autocomplete="email">
            </div>
            <div class="field-group">
                <label class="field-label">Şifre</label>
                <div class="field-pw-wrap">
                    <input id="reg-pass" class="field-input" type="password" placeholder="En az 8 karakter"
                        minlength="8" required autocomplete="new-password">
                    <button type="button" class="pw-toggle" onclick="togglePw('reg-pass',this)">👁</button>
                </div>
                <div class="pw-strength" id="pw-strength"></div>
            </div>
            <div class="field-group">
                <label class="field-label">Şifreyi Onayla</label>
                <input id="reg-pass2" class="field-input" type="password" placeholder="Şifreyi tekrar girin"
                    required>
            </div>

            <div id="reg-error" class="form-error"></div>
            <div id="reg-success" class="form-success"></div>

            <button type="submit" class="auth-submit" id="btn-register">Hesap Oluştur →</button>
            <p class="form-hint">Zaten bir hesabın var mı? <a href="/login">Giriş yap</a></p>
        </form>

        <p class="auth-back"><a href="/">← Ana sayfaya dön</a></p>
    </div>

    <script src="/system/i18n.js"></script>
    <script type="module" src="/auth.js"></script>
</body>

</html>
