<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | J2ST.LOL</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/dashboard.css">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dashboard-layout" style="position: relative; overflow: hidden; background: var(--chaos-deep);">
    <!-- Theme Background -->
    <div class="chaos-bg-wrapper" style="opacity: 0.2;"></div>
    <div class="chaos-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar chaos-glass" style="margin: 20px; border-radius: 24px; border: 1px solid rgba(168, 85, 247, 0.1);">
        <div class="dragon-font" style="font-size: 24px; font-weight: 900; margin-bottom: 40px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <img src="/assets/theme/dragon_logo.png" style="width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--chaos-purple);">
            J2ST<span style="color: var(--chaos-purple);">.LOL</span>
        </div>

        <nav style="flex: 1;">
            <a href="#" class="nav-link active" onclick="switchTab('profile')">
                <i class="fa-solid fa-user-ninja"></i> <span>Profilim</span>
            </a>
            <a href="#" class="nav-link" onclick="switchTab('links')">
                <i class="fa-solid fa-link"></i> <span>Bağlantılar</span>
            </a>
            <a href="#" class="nav-link" onclick="switchTab('design')">
                <i class="fa-solid fa-palette"></i> <span>Tasarım</span>
            </a>
            <a href="#" class="nav-link" onclick="switchTab('analytics')">
                <i class="fa-solid fa-chart-simple"></i> <span>Analiz</span>
            </a>
            <div style="margin: 20px 0; height: 1px; background: var(--glass-border);"></div>
            <a href="#" class="nav-link" onclick="switchTab('settings')">
                <i class="fa-solid fa-gear"></i> <span>Ayarlar</span>
            </a>
        </nav>

        <div style="margin-top: auto; padding-top: 20px;">
            <button onclick="logout()" class="secondary-btn" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <i class="fa-solid fa-right-from-bracket"></i> <span>Çıkış Yap</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="content-header">
            <h1 id="tab-title">Profilini Yönet</h1>
            <p id="tab-desc">Kimliğini ve dijital varlığını kişiselleştir.</p>
        </header>

        <!-- Tab: Profile -->
        <div id="tab-profile" class="tab-panel">
            <div class="dashboard-card">
                <h3 class="card-title"><i class="fa-solid fa-circle-user"></i> Temel Bilgiler</h3>
                <div class="form-row">
                    <div class="input-group">
                        <label>Görünen İsim</label>
                        <input type="text" id="profile-display-name" oninput="updatePreview()" placeholder="Adını yaz...">
                    </div>
                    <div class="input-group">
                        <label>Profil Sloganı (Bio)</label>
                        <input type="text" id="profile-bio" oninput="updatePreview()" placeholder="Kendinden bahset...">
                    </div>
                </div>
            </div>

            <div class="dashboard-card">
                <h3 class="card-title"><i class="fa-solid fa-image"></i> Görseller</h3>
                <div class="form-row">
                    <div class="input-group">
                        <label>Profil Resmi URL</label>
                        <input type="text" id="avatar-url-direct" oninput="updatePreview()" placeholder="https://...">
                    </div>
                    <div class="input-group">
                        <label>Banner URL (Video/Resim)</label>
                        <input type="text" id="banner-url-direct" oninput="updatePreview()" placeholder="https://...">
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab: Links -->
        <div id="tab-links" class="tab-panel" style="display: none;">
            <div class="dashboard-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h3 class="card-title" style="margin-bottom: 0;"><i class="fa-solid fa-link"></i> Sosyal Bağlantılar</h3>
                    <button class="primary-btn" onclick="openAddLinkModal()" style="padding: 8px 16px; font-size: 13px;">+ Link Ekle</button>
                </div>
                <div id="links-list" style="display: flex; flex-direction: column; gap: 12px;">
                    <!-- Links will be injected here -->
                </div>
            </div>
        </div>

        <!-- Action Bar -->
        <div style="position: fixed; bottom: 40px; left: 320px; right: 440px; display: flex; justify-content: center; pointer-events: none;">
            <button id="save-btn" onclick="saveProfileChanges()" class="primary-btn" style="pointer-events: auto; padding: 18px 60px; font-size: 18px; box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(124, 58, 237, 0.3); border: 1px solid var(--brand-primary); background: var(--brand-primary); color: #fff;">
                <i class="fa-solid fa-cloud-arrow-up"></i> Tüm Değişiklikleri Kaydet
            </button>
        </div>
    </main>

    <!-- Preview Sidebar -->
    <aside class="preview-sidebar">
        <div style="margin-bottom: 30px; text-align: center;">
            <div style="font-size: 13px; font-weight: 800; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;">Canlı Önizleme</div>
        </div>
        <div class="preview-container">
            <iframe id="preview-frame" src="/profile.html?preview=true" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
        <div style="margin-top: 40px; width: 100%;">
            <a id="view-my-profile" href="#" target="_blank" class="secondary-btn" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <i class="fa-solid fa-paper-plane"></i> Profilini Görüntüle
            </a>
        </div>
    </aside>

    <!-- Modal: Add Link -->
    <div id="link-modal" class="auth-container" style="display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);">
        <div class="auth-card glass-panel" style="max-width: 500px;">
            <h2 style="margin-bottom: 24px;">Yeni Bağlantı Ekle</h2>
            <div class="input-group">
                <label>BAŞLIK</label>
                <input type="text" id="modal-link-title" placeholder="Örn: Instagram">
            </div>
            <div class="input-group">
                <label>URL</label>
                <input type="text" id="modal-link-url" placeholder="https://...">
            </div>
            <div style="display: flex; gap: 12px;">
                <button class="primary-btn" style="flex: 1;" onclick="addLinkToList()">Ekle</button>
                <button class="secondary-btn" style="flex: 1;" onclick="closeModal()">İptal</button>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="/dashboard.js"></script>
</body>
</html>
